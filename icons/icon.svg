/* Placeholder SVG icon for BrevityPrompt */
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="url(#grad)" rx="24"/>
  
  <!-- Scissors icon representing shortening -->
  <g transform="translate(40, 30)">
    <!-- Left blade -->
    <circle cx="8" cy="12" r="6" fill="#fff" stroke="#fff" stroke-width="1"/>
    <line x1="8" y1="18" x2="24" y2="40" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Right blade -->
    <circle cx="40" cy="12" r="6" fill="#fff" stroke="#fff" stroke-width="1"/>
    <line x1="40" y1="18" x2="24" y2="40" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Text mark (representing text being cut) -->
    <line x1="24" y1="45" x2="40" y2="45" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="52" x2="36" y2="52" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
